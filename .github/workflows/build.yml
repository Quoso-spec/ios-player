name: iOS Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test iOS App
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for Generic iOS Device (No Signing)
        run: |
          xcodebuild archive \
            -project SaltMusic.xcodeproj \
            -scheme SaltMusic \
            -configuration Release \
            -archivePath build/SaltMusic.xcarchive \
            -sdk iphoneos \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.moriafly.saltplayer.ios.dev

      - name: Create Unsigned IPA Package
        run: |
          mkdir -p build/Payload
          cp -r build/SaltMusic.xcarchive/Products/Applications/SaltMusic.app build/Payload/
          cd build
          zip -r SaltMusic_Unsigned.ipa Payload
          cd ..

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: SaltMusic-Unsigned-IPA
          path: build/SaltMusic_Unsigned.ipa
