# Codemagic CI/CD Configuration for SaltPlayeriOS
# https://codemagic.io/

workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    environment:
      vars:
        XCODE_PROJECT: "SaltPlayeriOS.xcodeproj"
        XCODE_WORKSPACE: "SaltPlayeriOS.xcworkspace"
        XCODE_SCHEME: "SaltPlayeriOS"
        IPA_DIR: "build/ipa"
        IPA_NAME: "SaltPlayeriOS-${MARKETING_VERSION}-${CURRENT_PROJECT_VERSION}.ipa"
        IPA_REPO_PATH: "Releases/${MARKETING_VERSION}/${CURRENT_PROJECT_VERSION}"
        TEAM_ID: $TEAM_ID
        APP_ID: $APP_ID
      xcode: latest
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.saltplayer.app" --type IOS_APP_ADHOC --create
          xcode-project use-profiles
      - name: Build iOS project and export IPA
        script: |
          xcodebuild -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/SaltPlayeriOS.xcarchive \
            archive
      - name: Export IPA from archive
        script: |
          mkdir -p "$IPA_DIR"
          xcodebuild -exportArchive \
            -archivePath build/SaltPlayeriOS.xcarchive \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist codemagic-export-options.plist
      - name: Rename IPA deterministically
        script: |
          mv "$IPA_DIR"/*.ipa "$IPA_DIR/$IPA_NAME"
      - name: Verify exported artifacts
        script: |
          ls -lah "$IPA_DIR"
      - name: Commit IPA to repository
        script: |
          git config user.email "build@codemagic.io"
          git config user.name "Codemagic"
          mkdir -p "$IPA_REPO_PATH"
          cp "$IPA_DIR/$IPA_NAME" "$IPA_REPO_PATH/$IPA_NAME"
          git add "$IPA_REPO_PATH/$IPA_NAME"
          git commit -m "chore: publish $IPA_NAME" || echo "No changes to commit"
      - name: Push IPA to GitHub
        script: |
          git push origin HEAD:main
    artifacts:
      - build/ipa/*.ipa
      - build/ipa/*.plist
      - build/SaltPlayeriOS.xcarchive

  ios-snapshot-workflow:
    name: iOS Simulator Build (No Code Signing)
    max_build_duration: 30
    environment:
      vars:
        XCODE_PROJECT: "SaltPlayeriOS.xcodeproj"
        XCODE_SCHEME: "SaltPlayeriOS"
      xcode: latest
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Disable code signing for simulator
        script: |
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$XCODE_PROJECT/project.pbxproj"
          sed -i '' 's/CODE_SIGN_IDENTITY = "";/CODE_SIGN_IDENTITY = "-";/g' "$XCODE_PROJECT/project.pbxproj"
      - name: Build for simulator
        script: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
