# Codemagic CI/CD Configuration for SaltPlayeriOS
# https://codemagic.io/

workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      vars:
        XCODE_PROJECT: "SaltPlayeriOS.xcodeproj"
        XCODE_SCHEME: "SaltPlayeriOS"
        TEAM_ID: $TEAM_ID
      xcode: latest
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.saltplayer.app" --type IOS_APP_STORE --create
          xcode-project use-profiles
      - name: Build iOS project
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive

  ios-snapshot-workflow:
    name: iOS Simulator Build (No Code Signing)
    max_build_duration: 30
    environment:
      vars:
        XCODE_PROJECT: "SaltPlayeriOS.xcodeproj"
        XCODE_SCHEME: "SaltPlayeriOS"
      xcode: latest
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Build for simulator
        script: |
          xcode-project build \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --configuration Debug \
            --destination 'platform=iOS Simulator,name=iPhone 16 Pro'
