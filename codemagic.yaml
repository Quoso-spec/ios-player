# Codemagic CI/CD Configuration for SaltPlayeriOS
# https://codemagic.io/

workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    environment:
      vars:
        XCODE_PROJECT: "SaltPlayeriOS.xcodeproj"
        XCODE_WORKSPACE: "SaltPlayeriOS.xcworkspace"
        XCODE_SCHEME: "SaltPlayeriOS"
        TEAM_ID: $TEAM_ID
        APP_ID: $APP_ID
      xcode: latest
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.saltplayer.app" --type IOS_APP_STORE --create
          xcode-project use-profiles
      - name: Build iOS project and export IPA
        script: |
          xcodebuild -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/SaltPlayeriOS.xcarchive \
            archive
      - name: Export IPA from archive
        script: |
          xcodebuild -exportArchive \
            -archivePath build/SaltPlayeriOS.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist codemagic-export-options.plist
    artifacts:
      - build/ipa/*.ipa
      - build/SaltPlayeriOS.xcarchive

  ios-snapshot-workflow:
    name: iOS Simulator Build (No Code Signing)
    max_build_duration: 30
    environment:
      vars:
        XCODE_PROJECT: "SaltPlayeriOS.xcodeproj"
        XCODE_SCHEME: "SaltPlayeriOS"
      xcode: latest
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Disable code signing for simulator
        script: |
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$XCODE_PROJECT/project.pbxproj"
          sed -i '' 's/CODE_SIGN_IDENTITY = "";/CODE_SIGN_IDENTITY = "-";/g' "$XCODE_PROJECT/project.pbxproj"
      - name: Build for simulator
        script: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
